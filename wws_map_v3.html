function getColor(pct){
  if(pct>100) return '#023858';
  if(pct>=75) return '#08519c';
  if(pct>=50) return '#3182bd';
  if(pct>=35) return '#6baed6';
  if(pct>=25) return '#9ecae1';
  if(pct>=15) return '#c6dbef';
  return '#eff3ff';
}

// Build legend with state counts
(function(){
  var vals = Object.values(stateData).map(function(d){return d.totalWWS;});
  var buckets = [
    {label:'&gt; 100%', color:'#023858', test:function(v){return v>100;}},
    {label:'75 – 100%', color:'#08519c', test:function(v){return v>=75&&v<=100;}},
    {label:'50 – 75%', color:'#3182bd', test:function(v){return v>=50&&v<75;}},
    {label:'35 – 50%', color:'#6baed6', test:function(v){return v>=35&&v<50;}},
    {label:'25 – 35%', color:'#9ecae1', test:function(v){return v>=25&&v<35;}},
    {label:'15 – 25%', color:'#c6dbef', test:function(v){return v>=15&&v<25;}},
    {label:'0 – 15%', color:'#eff3ff', test:function(v){return v<15;}}
  ];
  var html = '';
  for(var i=0;i<buckets.length;i++){
    var count = vals.filter(buckets[i].test).length;
    html += '<div class="legend-row"><div class="legend-swatch" style="background:'+buckets[i].color+'"></div> '+buckets[i].label+' ('+count+')</div>';
  }
  document.getElementById('legend-rows').innerHTML = html;
  var gte100 = vals.filter(function(v){return v>=100;}).length;
  var gte75 = vals.filter(function(v){return v>=75;}).length;
  document.getElementById('legend-stats').innerHTML =
    '<div class="stat-row"><span class="stat-label">US Total WWS</span><span class="stat-val" style="color:#08519c">25.7%</span></div>'+
    '<div class="stat-row"><span class="stat-label">States ≥ 100%</span><span class="stat-val">'+gte100+'</span></div>'+
    '<div class="stat-row"><span class="stat-label">States ≥ 75%</span><span class="stat-val">'+gte75+'</span></div>';
})();

function buildPopup(name, d){
  var components = [
    {label:'Hydro', val:d.hydro},
    {label:'Wind', val:d.wind},
    {label:'Geothermal', val:d.geo},
    {label:'Utility PV+CSP', val:d.utilPV},
    {label:'BTM Solar PV', val:d.btmPV}
  ].sort(function(a,b){return b.val-a.val;});
  var barColor = getColor(d.totalWWS);
  var barWidth = Math.min(d.totalWWS, 100);
  var html = '<div class="popup-name">'+name+'</div>';
  html += '<div class="popup-rank">#'+(Object.values(stateData).filter(function(s){return s.totalWWS>d.totalWWS;}).length+1)+' of 51 by WWS %</div>';
  html += '<div class="popup-bar-bg"><div class="popup-bar-fill" style="width:'+barWidth+'%;background:'+barColor+'"></div></div>';
  html += '<div class="popup-section-title">WWS Generation</div>';
  html += '<div class="popup-row">Total WWS<span style="font-weight:700;color:'+barColor+'">'+d.totalWWS.toFixed(1)+'%</span></div>';
  html += '<hr class="popup-divider">';
  html += '<div class="popup-section-title">By Source (Descending)</div>';
  for(var i=0;i<components.length;i++){
    if(components[i].val>0) html += '<div class="popup-row">'+components[i].label+'<span>'+components[i].val.toFixed(1)+'%</span></div>';
  }
  for(var j=0;j<components.length;j++){
    if(components[j].val===0) html += '<div class="popup-row" style="opacity:0.45">'+components[j].label+'<span>0.0%</span></div>';
  }
  html += '<hr class="popup-divider">';
  html += '<div class="popup-section-title">Electricity Price</div>';
  html += '<div class="popup-row">Price Rank<span>#'+d.priceRank+' of 51</span></div>';
  html += '<div class="popup-row">Retail Price<span>'+d.price.toFixed(1)+' ¢/kWh</span></div>';
  return html;
}

async function exportPDF(){
  var btn=document.getElementById('btn-export');
  btn.disabled=true;btn.textContent='Exporting…';
  try{
    var {jsPDF}=window.jspdf;
    var pdf=new jsPDF({orientation:'landscape',unit:'px',format:[1280,720]});
    var headerEl=document.getElementById('header');
    var mapEl=document.getElementById('map');
    var legendEl=document.getElementById('legend');
    var headerCanvas=await html2canvas(headerEl,{scale:2,backgroundColor:'#ffffff',logging:false});
    var mapCanvas=await html2canvas(mapEl,{scale:1,backgroundColor:'#a8d4e8',logging:false,useCORS:true});
    var legendCanvas=await html2canvas(legendEl,{scale:2,backgroundColor:'#ffffff',logging:false});
    var hh=headerEl.offsetHeight;
    pdf.addImage(headerCanvas.toDataURL('image/png'),'PNG',0,0,1280,hh);
    pdf.addImage(mapCanvas.toDataURL('image/png'),'PNG',0,hh,1280,720-hh);
    var lw=legendEl.offsetWidth+20,lh=legendEl.offsetHeight+20;
    pdf.addImage(legendCanvas.toDataURL('image/png'),'PNG',1280-lw,720-lh,lw,lh);
    pdf.save('lantern-wws-map.pdf');
  }catch(e){console.error(e);}
  btn.disabled=false;btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export PDF';
}

fetch('https://raw.githubusercontent.com/PublicaMundi/MappingAPI/master/data/geojson/us-states.json')
.then(function(r){return r.json();})
.then(function(geo){
  L.geoJSON(geo,{
    style: function(feature){
      var name = feature.properties.name;
      var d = stateData[name];
      var pct = d ? d.totalWWS : 0;
      return {fillColor:getColor(pct),weight:1.2,color:'#ffffff',fillOpacity:0.85};
    },
    onEachFeature:function(feature,layer){
      var name = feature.properties.name;
      var d = stateData[name];
      if(d){
        layer.bindPopup(buildPopup(name,d),{maxWidth:280});
        layer.on('mouseover',function(){this.setStyle({weight:2.5,color:'#1a3a5c',fillOpacity:0.95});this.bringToFront();});
        layer.on('mouseout',function(){this.setStyle({weight:1.2,color:'#ffffff',fillOpacity:0.85});});
      }
    }
  }).addTo(map);
});
