<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,sans-serif}
body{background:#a8d4e8;color:#2c2c2a;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#header{padding:10px 16px;background:#ffffff;border-bottom:1px solid #d6d2c8;display:flex;align-items:center;gap:14px;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.08);z-index:500;position:relative}
#header h1{font-size:15px;font-weight:600;color:#2c2c2a;white-space:nowrap}
#header .subtitle{font-size:12px;color:#6b6b69}
#header-divider{width:1px;height:36px;background:#e0dbd4;flex-shrink:0}
#dropdowns{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-left:auto}
.ctrl-group{display:flex;align-items:center;gap:6px}
.ctrl-group label{font-size:12px;color:#6b6b69;white-space:nowrap}
select{background:#fff;border:1px solid #c8c4bc;color:#2c2c2a;border-radius:6px;padding:5px 10px;font-size:12px;cursor:pointer}
select:hover{background:#f5f3ef;border-color:#9a9690}

/* ── EXPORT BUTTON ── */
#btn-export{display:flex;align-items:center;gap:6px;background:#0e7490;color:#fff;border:none;border-radius:6px;padding:6px 14px;font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;transition:background .15s}
#btn-export:hover{background:#106880}
#btn-export:disabled{background:#8ab8c2;cursor:wait}
#btn-export svg{flex-shrink:0}

/* ── FILTER BAR ── */
#filter-bar{padding:8px 16px;background:#faf8f5;border-bottom:1px solid #e8e4de;display:flex;align-items:center;gap:8px;flex-wrap:wrap;z-index:499;position:relative}
.filter-label{font-size:12px;color:#7a7570;font-weight:500;white-space:nowrap}
.type-btn{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1.5px solid transparent;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;background:#fff;white-space:nowrap;user-select:none}
.type-btn:active{transform:scale(0.97)}
.type-btn .btn-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.type-btn.inactive{opacity:0.35;filter:grayscale(0.5)}
.filter-actions{display:flex;gap:6px;margin-left:auto}
.filter-actions button{background:#fff;border:1px solid #c8c4bc;color:#4a4a48;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer}
.filter-actions button:hover{background:#f0ede8}

/* ── MAP ── */
#map{flex:1}

/* ── STATS PANEL ── */
#stats{position:absolute;bottom:28px;right:12px;z-index:1000;background:rgba(255,255,255,0.96);border:1px solid #d0ccc4;border-radius:8px;padding:10px 14px;min-width:200px;box-shadow:0 2px 8px rgba(0,0,0,0.12)}
#stats h3{font-size:11px;font-weight:600;color:#7a7570;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.stat-row{display:flex;justify-content:space-between;font-size:12px;margin:3px 0;gap:16px}
.stat-label{color:#7a7570}
.stat-val{color:#2c2c2a;font-weight:500;text-align:right}
hr.stat-divider{border:none;border-top:1px solid #e8e4de;margin:6px 0}

/* ── POPUPS ── */
.leaflet-popup-content-wrapper{background:#fff;border:1px solid #d0ccc4;border-radius:8px;color:#2c2c2a;box-shadow:0 4px 16px rgba(0,0,0,0.15)}
.leaflet-popup-tip{background:#fff}
.popup-name{font-weight:600;font-size:13px;margin-bottom:5px;color:#1a1a18}
.popup-op{font-size:12px;font-weight:500;color:#0e7490;margin-bottom:4px}
.popup-row{font-size:12px;color:#7a7570;margin:2px 0}
.popup-row span{color:#2c2c2a}
.popup-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500;margin-bottom:6px}

/* ── ZOOM CONTROLS ── */
.leaflet-control-zoom a{background:#fff;color:#2c2c2a;border-color:#c8c4bc}
.leaflet-control-zoom a:hover{background:#f5f3ef}
.leaflet-control-attribution{display:none!important}
</style>
</head>

mazon Web Serivces","Crown Castle Fiber","bigbyte.cc","Duke Libraries","Oak Ridge National Laboratory","Ntirety","Fiberhub","UNM"];

// ── TYPE CONFIG ───────────────────────────────────────────────────────
const TYPE_META = [
  {key:'campus',   label:'Campus',   color:'#0e7490'},
  {key:'building', label:'Building', color:'#0891b2'},
  {key:'point',    label:'Point',    color:'#67c4d8'},
];
const TYPE_COLORS = {};
TYPE_META.forEach(t => TYPE_COLORS[t.key] = t.color);

let activeTypes  = new Set(TYPE_META.map(t => t.key));
let currentState = '';
let currentMinSf = 0;
let currentOp    = '';
let currentKnown = '';

// ── MAP INIT ─────────────────────────────────────────────────────────
const map = L.map('map', {center:[39.5,-98.35], zoom:4, zoomControl:true, preferCanvas:true});

// Light basemap tiles (land)
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
  maxZoom:19, subdomains:'abcd'
}).addTo(map);

// State boundaries via TopoJSON
const topoScript = document.createElement('script');
topoScript.src = 'https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js';
topoScript.onload = () => {
  fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json')
    .then(r => r.json())
    .then(us => {
      L.geoJSON(topojson.feature(us, us.objects.states), {
        style: {color:'#7a94b0', weight:1.2, fill:true, fillColor:'#f2efe9', fillOpacity:1, opacity:1}
      }).addTo(map);
      renderDots();
    });
};
document.head.appendChild(topoScript);

let layerGroup = L.layerGroup().addTo(map);

// ── SIZE → RADIUS ────────────────────────────────────────────────────
function radiusFromSqft(sf) {
  if(!sf || sf === 0) return 4;
  if(sf < 50000)   return 4;
  if(sf < 100000)  return 5;
  if(sf < 250000)  return 6;
  if(sf < 500000)  return 7.5;
  if(sf < 1000000) return 9;
  return 12;
}

function fmtSqft(sf) {
  if(!sf) return '—';
  if(sf >= 1000000) return (sf/1000000).toFixed(2) + 'M sq ft';
  if(sf >= 1000)    return Math.round(sf/1000) + 'K sq ft';
  return sf.toLocaleString() + ' sq ft';
}

// ── BADGE HTML ───────────────────────────────────────────────────────
const TYPE_BADGE = {
  campus:   'background:#e0f4f8;color:#0e7490',
  building: 'background:#e0f4f8;color:#0891b2',
  point:    'background:#f0fafb;color:#67c4d8',
};

// ── RENDER ───────────────────────────────────────────────────────────
function renderDots() {
  layerGroup.clearLayers();
  let shown = 0;
  const typeCounts = {};
  TYPE_META.forEach(t => typeCounts[t.key] = 0);

  RAW.forEach(r => {
    if(!activeTypes.has(r.t))  return;
    if(currentState && r.s !== currentState) return;
    if(r.sf < currentMinSf)    return;
    if(currentOp === '__known__'   && !r.op) return;
    if(currentOp === '__unknown__' &&  r.op) return;
    if(currentOp && currentOp !== '__known__' && currentOp !== '__unknown__' && r.op !== currentOp) return;
    if(currentKnown === 'known'   && !r.op) return;
    if(currentKnown === 'unknown' &&  r.op) return;

    const col = TYPE_COLORS[r.t] || '#0e7490';
    const mk  = L.circleMarker([r.la, r.lo], {
      radius: radiusFromSqft(r.sf),
      fillColor: col, color:'#fff', weight:0.5, fillOpacity:0.85
    });

    mk.bindPopup(`
      <div class="popup-name">${r.n || '(Unnamed facility)'}</div>
      ${r.op ? '<div class="popup-op">' + r.op + '</div>' : '<div class="popup-row" style="color:#9a9690;font-style:italic">Operator not listed</div>'}
      <span class="popup-badge" style="${TYPE_BADGE[r.t] || ''}">${r.t}</span>
      <div class="popup-row">State: <span>${r.st}</span></div>
      <div class="popup-row">County: <span>${r.co}</span></div>
      <div class="popup-row">Size: <span>${fmtSqft(r.sf)}</span></div>
      <div class="popup-row">Coordinates: <span>${r.la.toFixed(4)}, ${r.lo.toFixed(4)}</span></div>`,
      {maxWidth:240});
    mk.addTo(layerGroup);
    shown++;
    if(typeCounts[r.t] !== undefined) typeCounts[r.t]++;
  });

  document.getElementById('dot-count').textContent = shown.toLocaleString();

  let html = `<div class="stat-row"><span class="stat-label">Facilities shown</span><span class="stat-val">${shown.toLocaleString()}</span></div>
    <hr class="stat-divider"/>`;
  TYPE_META.forEach(t => {
    if(activeTypes.has(t.key) && typeCounts[t.key] > 0)
      html += `<div class="stat-row">
        <span class="stat-label" style="color:${t.color};font-weight:500">${t.label}</span>
        <span class="stat-val">${typeCounts[t.key].toLocaleString()}</span></div>`;
  });

  // Known vs unknown operator
  const knownShown = RAW.filter(r =>
    activeTypes.has(r.t) &&
    (!currentState || r.s === currentState) &&
    r.sf >= currentMinSf &&
    (currentKnown !== 'unknown') && r.op &&
    (currentOp === '' || currentOp === '__known__' || r.op === currentOp)
  ).length;

  html += `<hr class="stat-divider"/>
    <div class="stat-row"><span class="stat-label">Operator known</span><span class="stat-val">${Math.min(knownShown, shown).toLocaleString()}</span></div>`;
  document.getElementById('stats-body').innerHTML = html;
}

function render() {
  if(typeof topojson !== 'undefined') renderDots();
}

// ── TYPE BUTTONS ─────────────────────────────────────────────────────
function buildTypeButtons() {
  const container = document.getElementById('type-buttons');
  TYPE_META.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'type-btn';
    btn.dataset.key = t.key;
    btn.style.borderColor = t.color;
    btn.innerHTML = `<span class="btn-dot" style="background:${t.color}"></span>${t.label}`;
    btn.addEventListener('click', () => {
      if(activeTypes.has(t.key)) activeTypes.delete(t.key);
      else activeTypes.add(t.key);
      btn.classList.toggle('inactive', !activeTypes.has(t.key));
      render();
    });
    container.appendChild(btn);
  });
}

// ── STATE SELECT ─────────────────────────────────────────────────────
function buildStateSelect() {
  const sel = document.getElementById('state-select');
  const states = [...new Set(RAW.map(r => r.s))].sort();
  states.forEach(s => {
    const o = document.createElement('option');
    o.value = s;
    o.textContent = s;
    sel.appendChild(o);
  });
}

// ── OPERATOR SELECT ──────────────────────────────────────────────────
function buildOpSelect() {
  const sel = document.getElementById('op-select');
  OPERATORS.forEach(op => {
    const o = document.createElement('option');
    o.value = op;
    o.textContent = op;
    sel.appendChild(o);
  });
}

// ── EVENT LISTENERS ──────────────────────────────────────────────────
document.getElementById('state-select').addEventListener('change', e => { currentState = e.target.value; render(); });
document.getElementById('sf-select').addEventListener('change',    e => { currentMinSf = +e.target.value; render(); });
document.getElementById('op-select').addEventListener('change',    e => { currentOp    = e.target.value;  render(); });
document.getElementById('known-select').addEventListener('change', e => { currentKnown = e.target.value;  render(); });
document.getElementById('btn-all').addEventListener('click', () => {
  activeTypes = new Set(TYPE_META.map(t => t.key));
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('inactive'));
  render();
});
document.getElementById('btn-none').addEventListener('click', () => {
  activeTypes = new Set();
  document.querySelectorAll('.type-btn').forEach(b => b.classList.add('inactive'));
  render();
});

// ── PDF EXPORT ───────────────────────────────────────────────────────
const h2c = document.createElement('script');
h2c.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
document.head.appendChild(h2c);
const jpdf = document.createElement('script');
jpdf.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
document.head.appendChild(jpdf);

document.getElementById('btn-export').addEventListener('click', async () => {
  const btn = document.getElementById('btn-export');
  btn.disabled = true;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="5" stroke="white" stroke-width="1.5" stroke-dasharray="20"><animateTransform attributeName="transform" type="rotate" from="0 7 7" to="360 7 7" dur="0.8s" repeatCount="indefinite"/></circle></svg> Generating…';
  try {
    const canvas = await html2canvas(document.getElementById('map'), {
      useCORS:true, allowTaint:true, scale:2, backgroundColor:'#a8d4e8'
    });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({orientation:'landscape', unit:'px', format:[canvas.width/2, canvas.height/2]});
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 0, 0, canvas.width/2, canvas.height/2);
    const state   = document.getElementById('state-select').value || 'All-States';
    const date    = new Date().toISOString().slice(0,10);
    pdf.save(`Lantern_DataCenter_${state}_${date}.pdf`);
  } catch(e) { alert('Export failed: ' + e.message); }
  btn.disabled = false;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v7m0 0L4.5 5.5M7 8l2.5-2.5M2 10.5v1A1.5 1.5 0 003.5 13h7A1.5 1.5 0 0012 11.5v-1" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg> Export PDF';
});

// ── INIT ─────────────────────────────────────────────────────────────
buildTypeButtons();
buildStateSelect();
buildOpSelect();
</script>
